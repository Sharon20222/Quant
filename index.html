<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ShootingStars Quant Terminal</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">⚡ ShootingStars</div>

  <div class="nav-links">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('indicators')">Indicators</button>
    <button onclick="showPage('candles')">Candles</button>
    <button onclick="showPage('signals')">Signals</button>
  </div>
</div>

<!-- INPUT BAR -->
<div class="topbar">
  <input id="ticker" placeholder="Enter ticker (AAPL)">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<!-- PAGES -->

<div id="home" class="page active">
  <h1>Quant Research Dashboard</h1>
  <p>Multi-factor trading system using real market data, indicators, and signal generation.</p>
</div>

<div id="indicators" class="page">
  <h2>Indicators</h2>
  <div id="indicatorBox"></div>
</div>

<div id="candles" class="page">
  <h2>Candlestick Patterns</h2>
  <div id="candleBox"></div>
</div>

<div id="signals" class="page">
  <h2>Trading Signals</h2>
  <div id="signalBox"></div>
</div>

<script src="app.js"></script>
</body>
</html>
